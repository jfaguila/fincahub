services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fincahub
      POSTGRES_PASSWORD: fincahub123
      POSTGRES_DB: fincahub
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincahub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://fincahub:fincahub123@db:5432/fincahub
      JWT_SECRET: fincahub-local-secret-2026
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  db_data:
